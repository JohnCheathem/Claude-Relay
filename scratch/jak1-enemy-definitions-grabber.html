<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jak 1 Enemy Definitions Grabber</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 24px; min-height: 100vh; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; color: #fff; }
.sub { font-size: 13px; color: #888; margin-bottom: 20px; }
.proxy-row { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; }
.proxy-row strong { color: #999; display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
.proxy-status { display: flex; gap: 8px; flex-wrap: wrap; }
.ps { padding: 3px 10px; border-radius: 4px; font-size: 11px; }
.ps-pending { background: #2a2a2a; color: #666; border: 1px solid #444; }
.ps-testing { background: #1a3a5c; color: #7bb3e0; border: 1px solid #2a5a8c; }
.ps-ok { background: #1a3a24; color: #6fcf97; border: 1px solid #2a5a3a; }
.ps-fail { background: #3a1a1a; color: #eb5757; border: 1px solid #5a2a2a; }
.controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
button { background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; }
button:hover:not(:disabled) { background: #333; }
button:disabled { opacity: 0.4; cursor: default; }
button.primary { background: #1a5c9e; border-color: #2a7cd4; color: #fff; }
button.primary:hover:not(:disabled) { background: #1e6db5; }
#log { background: #111; border: 1px solid #333; border-radius: 8px; padding: 14px; font-family: monospace; font-size: 12px; height: 130px; overflow-y: auto; margin-bottom: 16px; }
.log-line { padding: 1px 0; line-height: 1.5; }
.log-ok { color: #6fcf97; }
.log-err { color: #eb5757; }
.log-info { color: #9b9b9b; }
.log-warn { color: #f2c94c; }
.progress-bar { height: 3px; background: #333; border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
.progress-fill { height: 100%; background: #1a7cd4; border-radius: 2px; transition: width 0.3s; width: 0%; }
.stats { display: flex; gap: 10px; margin-bottom: 16px; }
.stat { background: #222; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; flex: 1; }
.stat-val { font-size: 22px; font-weight: 600; color: #fff; }
.stat-lbl { font-size: 11px; color: #666; margin-top: 2px; }
.enemy-list { display: flex; flex-direction: column; gap: 10px; }
.enemy-card { background: #222; border: 1px solid #333; border-radius: 8px; padding: 14px 16px; }
.enemy-card.loading { opacity: 0.5; }
.enemy-card.done { border-color: #2a5a3a; }
.enemy-card.error { border-color: #5a2a2a; }
.ec-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.ec-name { font-size: 14px; font-weight: 500; color: #ddd; }
.ec-code { font-size: 11px; color: #555; font-family: monospace; }
.ec-desc { font-size: 13px; color: #aaa; line-height: 1.6; }
.ec-full { font-size: 12px; color: #666; line-height: 1.6; margin-top: 6px; border-top: 1px solid #2a2a2a; padding-top: 6px; max-height: 120px; overflow-y: auto; }
.ec-badge { font-size: 10px; padding: 2px 7px; border-radius: 3px; background: #2a2a2a; color: #666; border: 1px solid #3a3a3a; }
.ec-badge.ok { background: #1a3a24; color: #6fcf97; border-color: #2a5a3a; }
.ec-badge.err { background: #3a1a1a; color: #eb5757; border-color: #5a2a2a; }
</style>
</head>
<body>

<h1>Jak 1 Enemy Definitions Grabber</h1>
<p class="sub">Pulls descriptions from the Jak & Daxter Fandom wiki for every Jak 1 enemy. Downloads as JSON + CSV.</p>

<div class="proxy-row">
  <strong>Proxy status</strong>
  <div class="proxy-status" id="proxy-status"></div>
</div>

<div class="controls">
  <button class="primary" id="btn-fetch" onclick="startFetch()">Fetch all definitions</button>
  <button id="btn-dl-json" onclick="downloadJSON()" disabled>Download JSON</button>
  <button id="btn-dl-csv" onclick="downloadCSV()" disabled>Download CSV</button>
  <button onclick="clearAll()">Clear</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">total enemies</div></div>
  <div class="stat"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">fetched</div></div>
  <div class="stat"><div class="stat-val" id="s-found">0</div><div class="stat-lbl">with description</div></div>
  <div class="stat"><div class="stat-val" id="s-err">0</div><div class="stat-lbl">not found</div></div>
</div>

<div id="log"></div>
<div class="enemy-list" id="list"></div>

<script>
const FANDOM_API = 'https://jakanddaxter.fandom.com/api.php';

// Enemy list: wiki article title → code name in OpenGOAL source
const ENEMIES = [
  { wiki: 'Babak',                       code: 'babak',                  level: 'All hubs' },
  { wiki: 'Bone armor lurker',           code: 'bonelurker',             level: 'Misty Island' },
  { wiki: 'Quicksand lurker',            code: 'quicksandlurker',        level: 'Misty Island' },
  { wiki: 'Balloon lurker',              code: 'balloonlurker',          level: 'Misty Island' },
  { wiki: 'Lurker puppy',               code: 'lurkerpuppy',            level: 'Sentinel Beach' },
  { wiki: 'Lurker crab',                code: 'lurkercrab',             level: 'Sentinel Beach' },
  { wiki: 'Lurker worm',                code: 'lurkerworm',             level: 'Sentinel Beach' },
  { wiki: 'Hopper (Jak and Daxter)',    code: 'hopper',                 level: 'Forbidden Jungle' },
  { wiki: 'Jungle snake',               code: 'junglesnake',            level: 'Forbidden Jungle' },
  { wiki: 'Jungle fish',                code: 'junglefish',             level: 'Forbidden Jungle' },
  { wiki: 'Aphid lurker',               code: 'aphid',                  level: 'Forbidden Temple' },
  { wiki: 'Dark eco plant',             code: 'plant-boss',             level: 'Forbidden Temple' },
  { wiki: 'Double lurker',              code: 'double-lurker',          level: 'Lost Precursor City' },
  { wiki: 'Puffer',                     code: 'puffer',                 level: 'Lost Precursor City' },
  { wiki: 'Bully',                      code: 'bully',                  level: 'Lost Precursor City' },
  { wiki: 'Swamp rat',                  code: 'swamp-rat',              level: 'Boggy Swamp' },
  { wiki: 'Swamp bat',                  code: 'swamp-bat',              level: 'Boggy Swamp' },
  { wiki: 'Lurker toad',               code: 'kermit',                 level: 'Boggy Swamp' },
  { wiki: 'Lurker frog',               code: 'billy',                  level: 'Boggy Swamp' },
  { wiki: 'Driller lurker',            code: 'driller-lurker',         level: 'Spider Cave / Snowy Mtn' },
  { wiki: 'Baby spider',               code: 'baby-spider',            level: 'Spider Cave' },
  { wiki: 'Mother spider',             code: 'mother-spider',          level: 'Spider Cave' },
  { wiki: 'Gnawing lurker',            code: 'gnawer',                 level: 'Spider Cave' },
  { wiki: 'Snow bunny',                code: 'snow-bunny',             level: 'Snowy Mountain' },
  { wiki: 'Yeti',                      code: 'yeti',                   level: 'Snowy Mountain' },
  { wiki: 'Ice lurker',                code: 'snow-ram-boss',          level: 'Snowy Mountain' },
  { wiki: 'Flying lurker',             code: 'flying-lurker',          level: 'Mountain Pass' },
  { wiki: 'Klaww',                     code: 'ogreboss',               level: 'Mountain Pass (Boss)' },
  { wiki: 'Robber',                    code: 'rolling-robber',         level: 'Precursor Basin' },
  { wiki: 'Lightning mole',            code: 'rolling-lightning-mole', level: 'Precursor Basin' },
  { wiki: 'Lurker shark',              code: 'lurker-shark',           level: 'Ocean border' },
  { wiki: 'Green eco lurker',          code: 'green-eco-lurker',       level: 'Final Boss' },
  { wiki: 'Precursor robot',           code: 'robotboss',              level: 'Final Boss' },
];

const PROXIES = [
  { name: 'allorigins',  wrap: u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
  { name: 'corsproxy',   wrap: u => `https://corsproxy.io/?url=${encodeURIComponent(u)}` },
  { name: 'codetabs',    wrap: u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}` },
  { name: 'thingproxy',  wrap: u => `https://thingproxy.freeboard.io/fetch/${u}` },
  { name: 'htmldriven',  wrap: u => `https://cors-proxy.htmldriven.com/?url=${encodeURIComponent(u)}` },
];

let workingProxy = null;
let results = [];
let doneCount = 0, foundCount = 0, errCount = 0;

function log(msg, cls='log-info') {
  const d = document.getElementById('log');
  const el = document.createElement('div');
  el.className = 'log-line ' + cls;
  el.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  d.appendChild(el);
  d.scrollTop = d.scrollHeight;
}
function setProgress(p) { document.getElementById('progress').style.width = Math.min(100,p)+'%'; }
function updateStats() {
  document.getElementById('s-total').textContent = ENEMIES.length;
  document.getElementById('s-done').textContent = doneCount;
  document.getElementById('s-found').textContent = foundCount;
  document.getElementById('s-err').textContent = errCount;
}

function initProxyUI() {
  const el = document.getElementById('proxy-status');
  el.innerHTML = '';
  PROXIES.forEach(p => {
    const s = document.createElement('span');
    s.className = 'ps ps-pending';
    s.id = 'ps-' + p.name;
    s.textContent = p.name;
    el.appendChild(s);
  });
}
function setPS(name, status) {
  const el = document.getElementById('ps-' + name);
  if (!el) return;
  el.className = 'ps ps-' + status;
  if (status === 'ok') el.textContent = name + ' ✓';
  else if (status === 'fail') el.textContent = name + ' ✗';
  else if (status === 'testing') el.textContent = name + ' …';
}

async function proxyFetch(url, proxy) {
  const r = await fetch(proxy.wrap(url), { signal: AbortSignal.timeout(9000) });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const text = await r.text();
  try { const j = JSON.parse(text); if (j.contents) return j.contents; } catch(_) {}
  return text;
}

async function testProxy(proxy) {
  setPS(proxy.name, 'testing');
  try {
    const text = await proxyFetch(FANDOM_API + '?action=query&meta=siteinfo&siprop=general&format=json', proxy);
    const data = JSON.parse(text);
    if (data?.query?.general?.sitename) { setPS(proxy.name, 'ok'); return true; }
    throw new Error('bad response');
  } catch(e) { setPS(proxy.name, 'fail'); return false; }
}

async function findProxy() {
  log('Testing CORS proxies...', 'log-info');
  for (const p of PROXIES) {
    if (await testProxy(p)) { log('Using: ' + p.name, 'log-ok'); return p; }
  }
  return null;
}

// Fetch article intro text using TextExtracts API (returns plain text, no HTML)
async function fetchDefinition(wikiTitle) {
  const url = FANDOM_API + '?' + new URLSearchParams({
    action: 'query',
    titles: wikiTitle,
    prop: 'extracts|categories',
    exintro: true,       // intro section only
    explaintext: true,   // plain text, no HTML
    exsectionformat: 'plain',
    redirects: true,
    format: 'json'
  });
  const text = await proxyFetch(url, workingProxy);
  const data = JSON.parse(text);
  const pages = data?.query?.pages || {};
  const page = Object.values(pages)[0];

  if (!page || page.missing !== undefined) return { found: false };

  const extract = (page.extract || '').trim();
  const cats = (page.categories || []).map(c => c.title.replace('Category:', ''));

  return {
    found: true,
    title: page.title,
    extract,
    // First sentence only = short description
    short: extract.split(/\.\s/)[0].replace(/\n.*/s, '').trim() + '.',
    categories: cats,
    pageId: page.pageid
  };
}

function renderCard(enemy, info, idx) {
  const list = document.getElementById('list');
  const card = document.createElement('div');
  card.id = 'card-' + idx;
  card.className = 'enemy-card ' + (info ? (info.found ? 'done' : 'error') : 'loading');

  const header = document.createElement('div');
  header.className = 'ec-header';

  const left = document.createElement('div');
  const name = document.createElement('span');
  name.className = 'ec-name';
  name.textContent = enemy.wiki;
  const code = document.createElement('span');
  code.className = 'ec-code';
  code.textContent = '  ' + enemy.code + '  ·  ' + enemy.level;
  left.appendChild(name);
  left.appendChild(code);

  const badge = document.createElement('span');
  badge.className = 'ec-badge' + (info ? (info.found ? ' ok' : ' err') : '');
  badge.textContent = info ? (info.found ? 'found' : 'not found') : 'loading…';

  header.appendChild(left);
  header.appendChild(badge);
  card.appendChild(header);

  if (info?.found && info.extract) {
    const short = document.createElement('div');
    short.className = 'ec-desc';
    short.textContent = info.short;
    card.appendChild(short);

    if (info.extract.length > info.short.length + 5) {
      const full = document.createElement('div');
      full.className = 'ec-full';
      full.textContent = info.extract;
      card.appendChild(full);
    }
  }

  list.appendChild(card);
  return card;
}

async function startFetch() {
  document.getElementById('btn-fetch').disabled = true;
  document.getElementById('btn-dl-json').disabled = true;
  document.getElementById('btn-dl-csv').disabled = true;
  document.getElementById('list').innerHTML = '';
  document.getElementById('log').innerHTML = '';
  results = []; doneCount = 0; foundCount = 0; errCount = 0;
  updateStats(); setProgress(2); initProxyUI();

  workingProxy = await findProxy();
  if (!workingProxy) {
    log('All proxies failed. Try disabling VPN/extensions.', 'log-err');
    document.getElementById('btn-fetch').disabled = false;
    return;
  }

  log(`Fetching definitions for ${ENEMIES.length} enemies...`, 'log-info');
  setProgress(10);

  for (let i = 0; i < ENEMIES.length; i++) {
    const enemy = ENEMIES[i];
    log(`[${i+1}/${ENEMIES.length}] ${enemy.wiki}`, 'log-info');

    let info = null;
    try {
      info = await fetchDefinition(enemy.wiki);
    } catch(e) {
      log(`Error on ${enemy.wiki}: ${e.message}`, 'log-warn');
      info = { found: false, error: e.message };
    }

    const result = { ...enemy, ...info };
    results.push(result);
    doneCount++;
    if (info?.found) foundCount++; else errCount++;
    updateStats();
    renderCard(enemy, info, i);
    setProgress(10 + (i / ENEMIES.length) * 88);

    // Small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 300));
  }

  setProgress(100);
  log(`Done. ${foundCount}/${ENEMIES.length} definitions found.`, 'log-ok');
  document.getElementById('btn-fetch').disabled = false;
  if (foundCount > 0) {
    document.getElementById('btn-dl-json').disabled = false;
    document.getElementById('btn-dl-csv').disabled = false;
  }
}

function downloadJSON() {
  const data = results.map(r => ({
    wiki_title: r.wiki,
    code_name: r.code,
    level: r.level,
    found: r.found,
    short_description: r.short || '',
    full_description: r.extract || '',
    categories: r.categories || [],
    wiki_page_id: r.pageId || null
  }));
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'jak1-enemy-definitions.json';
  a.click();
  log('JSON downloaded.', 'log-ok');
}

function downloadCSV() {
  const rows = [['wiki_title','code_name','level','found','short_description','full_description']];
  for (const r of results) {
    const esc = s => '"' + (s||'').replace(/"/g,"'").replace(/\n/g,' ') + '"';
    rows.push([esc(r.wiki), esc(r.code), esc(r.level), r.found?'true':'false', esc(r.short), esc(r.extract)]);
  }
  const blob = new Blob([rows.map(r=>r.join(',')).join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'jak1-enemy-definitions.csv';
  a.click();
  log('CSV downloaded.', 'log-ok');
}

function clearAll() {
  document.getElementById('list').innerHTML = '';
  document.getElementById('log').innerHTML = '';
  document.getElementById('proxy-status').innerHTML = '';
  results = []; doneCount = 0; foundCount = 0; errCount = 0;
  workingProxy = null;
  updateStats(); setProgress(0);
  document.getElementById('btn-dl-json').disabled = true;
  document.getElementById('btn-dl-csv').disabled = true;
}

initProxyUI(); updateStats();
</script>
</body>
</html>
